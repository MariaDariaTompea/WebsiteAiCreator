<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebCraft AI - Intelligent Website & UI Mockup Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header glass-panel">
      <div class="logo-section">
        <div class="logo-icon">W</div>
        <div class="logo-text">WebCraft AI</div>
      </div>
      <div class="header-meta">
        <span class="status-indicator"></span>
        <span>AI Engine Active (Pollinations-SD)</span>
      </div>
    </header>

    <!-- Main Workspace -->
    <main class="dashboard-grid">
      <!-- Left Column: Customizers -->
      <aside class="sidebar glass-panel">
        <h2 class="sidebar-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--accent-primary)"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
          Style Customizer
        </h2>

        <!-- Presets -->
        <div class="sidebar-section">
          <span class="section-label">THEME PRESETS</span>
          <div class="theme-presets" id="theme-presets">
            <!-- Rendered in app.js -->
          </div>
        </div>

        <!-- Custom Color Inputs -->
        <div class="sidebar-section">
          <span class="section-label">CUSTOM PALETTE</span>
          <div class="color-picker-grid">
            <div class="picker-input">
              <input type="color" id="color-primary">
              <div class="picker-label-sub">
                <span>Primary</span>
                <span class="picker-value" id="val-primary">#8B5CF6</span>
              </div>
            </div>
            <div class="picker-input">
              <input type="color" id="color-secondary">
              <div class="picker-label-sub">
                <span>Secondary</span>
                <span class="picker-value" id="val-secondary">#06B6D4</span>
              </div>
            </div>
            <div class="picker-input">
              <input type="color" id="color-bg">
              <div class="picker-label-sub">
                <span>Canvas</span>
                <span class="picker-value" id="val-bg">#09080E</span>
              </div>
            </div>
            <div class="picker-input">
              <input type="color" id="color-text">
              <div class="picker-label-sub">
                <span>Text</span>
                <span class="picker-value" id="val-text">#F3F4F6</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Font picker -->
        <div class="sidebar-section">
          <span class="section-label">TYPOGRAPHY</span>
          <select id="font-select" class="font-select">
            <!-- Populated dynamically -->
          </select>
          <div id="font-preview" class="font-preview">
            Preview Text
          </div>
        </div>

        <!-- Generate Trigger Button -->
        <button id="generate-btn" class="generate-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
          Generate Website
        </button>
      </aside>

      <!-- Right Column: Tags & Studio -->
      <section class="workspace-wrapper">
        <!-- 50 Tag Dictionary -->
        <div class="tag-container glass-panel">
          <div class="tag-header">
            <h3 style="font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--accent-secondary);"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
              Keyword Dictionary
            </h3>
            <span class="tag-counter"><span id="selected-count">0</span> / 8 Selected</span>
          </div>
          
          <div id="tag-dictionary">
            <!-- Generated in app.js -->
          </div>
        </div>

        <!-- Output Sandbox -->
        <div class="output-studio glass-panel">
          <div class="studio-tabs-bar">
            <div class="studio-tabs">
              <button class="tab-btn active" id="tab-mockup">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                Mockup Design
              </button>
              <button class="tab-btn" id="tab-prototype">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                Live Prototype
              </button>
              <button class="tab-btn" id="tab-code">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                Source Code
              </button>
            </div>

            <!-- Viewport toggle controls (Only visible on Prototype tab) -->
            <div class="viewport-controls" id="viewport-controls" style="display: none;">
              <button class="viewport-btn active" data-viewport="desktop" title="Desktop View">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
              </button>
              <button class="viewport-btn" data-viewport="tablet" title="Tablet View">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
              </button>
              <button class="viewport-btn" data-viewport="mobile" title="Mobile View">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
              </button>
            </div>
          </div>

          <div class="studio-body" id="studio-body">
            <!-- Populated by app.js based on active state -->
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Toast Notification Overlay -->
  <div class="toast" id="toast">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--accent-secondary);"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="toast-message">Success!</span>
  </div>

  <script src="https://js.puter.com/v2/"></script>
  <script src="app.js"></script>
</body>
</html>
